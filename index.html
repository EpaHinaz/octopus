<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>StorySpark – Read & Learn</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .question-card {
      background: #fef9ef;
      border: 1px solid #ffe3bd;
      border-radius: 36px;
      padding: 18px 24px;
      margin-bottom: 24px;
    }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 12px 0;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      padding: 6px 16px;
      border-radius: 60px;
    }
    .feedback {
      display: block;
      margin-top: 8px;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: 30px;
    }
    .feedback.correct {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .feedback.wrong {
      background: #ffebee;
      color: #c62828;
    }
    .submit-all {
      background: #ffa53e;
      border: none;
      width: 100%;
      padding: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      margin: 20px 0;
      box-shadow: 0 4px 0 #b45f1b;
      transition: 0.05s linear;
    }
    .submit-all:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b45f1b;
    }
    .submit-all:disabled {
      background: #ccc;
      transform: none;
      cursor: not-allowed;
      box-shadow: none;
    }
    .all-correct-message {
      background: #c8e6c9;
      text-align: center;
      padding: 12px;
      border-radius: 40px;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
<div class="container">
  <nav class="navbar">
    <a href="index.html">📖 Stories</a>
    <a href="history.html">📜 History</a>
    <a href="sentence-builder.html">✏️ Sentence Builder</a>
    <a href="idea-journal.html">💡 Idea Journal</a>
  </nav>

  <div class="story-card">
    <div class="story-title" id="storyTitle">Loading...</div>
    <div class="story-text" id="storyText"></div>
  </div>

  <div id="questionsContainer"></div>

  <button id="submitAllBtn" class="submit-all">✨ Check All Answers ✨</button>

  <div style="text-align: center; margin: 20px;">
    <button id="resetProgressBtn" style="background:#f1e0c7; border:none; padding:12px 24px; border-radius:60px;">🔄 Reset All Progress</button>
  </div>
</div>

<script src="assets/stories.js"></script>
<script src="assets/main.js"></script>
<script>
  let currentStoryId = 0;
  let storyData = STORIES[0];
  // Track whether this story has already been completed perfectly (to avoid duplicate stars)
  let alreadyCompleted = false;

  function renderStory() {
    storyData = STORIES[currentStoryId];
    document.getElementById('storyTitle').innerText = storyData.title;
    document.getElementById('storyText').innerText = storyData.text;

    // Check if this story was already completed perfectly in the past
    const bestStars = getBestStars();
    alreadyCompleted = (bestStars[storyData.id] === storyData.questions.length);

    let html = '';
    storyData.questions.forEach((q, idx) => {
      html += `
        <div class="question-card" data-qid="${idx}">
          <p><strong>❓ ${q.text}</strong></p>
          <div class="options">
      `;
      q.options.forEach((opt, optIdx) => {
        html += `
          <label class="option">
            <input type="radio" name="q${idx}" value="${optIdx}">
            ${opt}
          </label>
        `;
      });
      html += `
          </div>
          <div class="feedback" id="feedback-${idx}"></div>
          <div class="hint-text" style="font-size:0.8rem; margin-top:8px;">💡 Hint: ${q.hint}</div>
        </div>
      `;
    });
    document.getElementById('questionsContainer').innerHTML = html;

    // If already completed, disable submit button and show message
    const submitBtn = document.getElementById('submitAllBtn');
    if (alreadyCompleted) {
      submitBtn.disabled = true;
      const msgDiv = document.createElement('div');
      msgDiv.className = 'all-correct-message';
      msgDiv.innerHTML = '🌟 You already earned all stars for this story! 🌟';
      const container = document.getElementById('questionsContainer');
      if (!document.querySelector('.all-correct-message')) {
        container.insertAdjacentHTML('afterend', msgDiv.outerHTML);
      }
    } else {
      submitBtn.disabled = false;
      // Remove any existing message
      const existingMsg = document.querySelector('.all-correct-message');
      if (existingMsg) existingMsg.remove();
    }
  }

  function evaluateAll() {
    if (alreadyCompleted) {
      showNotification("You've already mastered this story! Choose another.", false);
      return false;
    }

    let allCorrect = true;
    const results = [];

    storyData.questions.forEach((q, idx) => {
      const selected = document.querySelector(`input[name="q${idx}"]:checked`);
      const isCorrect = selected && parseInt(selected.value) === q.correct;
      if (!isCorrect) allCorrect = false;

      results.push({
        index: idx,
        isCorrect: isCorrect,
        userAnswer: selected ? q.options[parseInt(selected.value)] : "(no answer)",
        correctAnswer: q.options[q.correct],
        hint: q.hint
      });
    });

    // Display feedback for each question
    results.forEach(res => {
      const feedbackDiv = document.getElementById(`feedback-${res.index}`);
      if (res.isCorrect) {
        feedbackDiv.innerHTML = '✅ Correct!';
        feedbackDiv.className = 'feedback correct';
      } else {
        feedbackDiv.innerHTML = `❌ Not quite. ${res.hint}`;
        feedbackDiv.className = 'feedback wrong';
      }
    });

    if (allCorrect) {
      // Award stars and save to history
      const totalStars = storyData.questions.length;
      const updated = setBestStars(storyData.id, totalStars);
      saveAttempt(storyData.id, storyData.title, totalStars, totalStars);
      showNotification(`🎉 Perfect! You earned all ${totalStars} stars! 🎉`, false);
      
      // Disable submit button and show completion message
      const submitBtn = document.getElementById('submitAllBtn');
      submitBtn.disabled = true;
      alreadyCompleted = true;
      
      const container = document.getElementById('questionsContainer');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'all-correct-message';
      msgDiv.innerHTML = '🌟 Congratulations! You mastered this story! 🌟';
      container.insertAdjacentHTML('afterend', msgDiv.outerHTML);
      
      return true;
    } else {
      showNotification("Some answers are incorrect. Try again! Read the hints.", true);
      return false;
    }
  }

  function loadStoryFromDropdown() {
    const select = document.getElementById('storySelect');
    if (select) {
      currentStoryId = parseInt(select.value);
      renderStory();
    }
  }

  // Create story selector dropdown
  function createStorySelector() {
    const container = document.querySelector('.story-card');
    const selectDiv = document.createElement('div');
    selectDiv.style.marginBottom = '16px';
    selectDiv.innerHTML = `
      <label for="storySelect" style="font-weight:bold;">📚 Choose a story: </label>
      <select id="storySelect" style="padding:8px 16px; border-radius:40px; margin-left:8px;">
        ${STORIES.map(s => `<option value="${s.id}">${s.title}</option>`).join('')}
      </select>
    `;
    container.insertBefore(selectDiv, container.firstChild);
    document.getElementById('storySelect').addEventListener('change', loadStoryFromDropdown);
  }

  document.addEventListener('DOMContentLoaded', () => {
    createStorySelector();
    renderStory();
    document.getElementById('submitAllBtn').addEventListener('click', evaluateAll);
    document.getElementById('resetProgressBtn').addEventListener('click', resetAllProgress);
  });
</script>
</body>
</html>
